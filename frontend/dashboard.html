<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Everytel v8.2 Modular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800 pb-20">

    <header id="navbar-container" class="sticky top-0 z-50"></header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        
        <div id="toolbar-container" class="flex flex-wrap gap-3 mb-6 justify-end hidden"></div>

        <div id="upload-modal-container" class="mb-8"></div>

        <div class="relative mb-8">
            <input type="text" id="global-search" placeholder="🔍 Buscar proyectos..." class="w-full pl-12 pr-4 py-3.5 rounded-full border border-gray-200 shadow-sm focus:ring-2 focus:ring-blue-500 bg-white">
            <div class="absolute top-4 left-4 text-gray-400"><i data-feather="search" width="20"></i></div>
        </div>

        <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="empty-state" class="hidden text-center py-16 text-gray-400"><p>No se encontraron proyectos.</p></div>
    </main>

    <div id="modal-layer">
        <div id="viewer-modal-placeholder"></div> <div id="users-modal-placeholder"></div>  <div id="services-modal-placeholder"></div> </div>

    <div id="overlay-layer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
